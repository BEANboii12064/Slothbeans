<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Sloth.beans</title>
    <style>
      body {
        background-color: #1a1a1a;
        color: #e0e0e0;
        font-family: 'Courier New', Courier, monospace;
        text-align: center;
        padding-top: 50px;
      }
      button {
        background-color: #4caf50;
        color: white;
        border: none;
        padding: 15px 32px;
        font-size: 16px;
        margin: 20px;
        cursor: pointer;
        border-radius: 8px;
        font-family: inherit;
        box-shadow: 0 4px #2e7d32;
      }
      button:active {
        box-shadow: 0 0 #2e7d32;
        transform: translateY(4px);
      }
      .hidden {
        display: none;
      }
      #slothBtn {
        background-color: #795548;
        font-size: 24px;
        box-shadow: 0 4px #4e342e;
      }
    </style>
  </head>
  <body>

    <h1>🦥 Welcome to Sloth.beans 🫘</h1>
    
    <!-- This section shows while under construction -->
    <div id="constructionZone">
      <p>Under construction at a very relaxed pace...</p>
      <h2>Time Remaining: <span id="timerText">100</span> minutes</h2>
      <button id="helpBtn" onclick="helpBuild()">👷 Help Speed It Up!</button>
    </div>

    <!-- This section stays hidden until the countdown hits 0 -->
    <div id="slothZone" class="hidden">
      <h2>Construction complete! 🎉</h2>
      <button id="slothBtn" onclick="doNothing()">🦥 Sloth Button</button>
      <p id="nothingText" style="color: #888; font-style: italic; margin-top: 10px;"></p>
    </div>

    <script>
      // Starting time
      let timeRemaining = 100;

      function helpBuild() {
        // Drop the time by a random amount between 5 and 15
        let reduction = Math.floor(Math.random() * 11) + 5;
        timeRemaining -= reduction;

        // If it goes below zero, force it to zero
        if (timeRemaining < 0) {
          timeRemaining = 0;
        }

        // Update the screen text
        document.getElementById("timerText").innerText = timeRemaining;

        // Check if we hit zero!
        if (timeRemaining === 0) {
          // Hide the construction area
          document.getElementById("constructionZone").classList.add("hidden");
          // Reveal the sloth area
          document.getElementById("slothZone").classList.remove("hidden");
        }
      }

      function doNothing() {
        // Just displays a message proving it literally does nothing
        document.getElementById("nothingText").innerText = "(The sloth blinks lazily. Nothing happened.)";
      }
    </script>

  </body>
</html>
